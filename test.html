<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Dumplin Surabaya</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset & Font Dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Wadah Berukuran Layar HP (Mockup) */
        .phone-container {
            width: 375px;
            height: 812px;
            background-color: #FFD460;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px 4px 24px;
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }

        .status-icons i {
            margin-left: 4px;
        }

        /* Header */
        .app-header {
            display: flex;
            align-items: center;
            padding: 15px 24px;
            position: relative;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 16px;
            color: #E05206;
            cursor: pointer;
            font-weight: bold;
        }

        .app-header h1 {
            flex-grow: 1;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            margin-right: 16px;
            /* Balance back button */
            text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.1);
        }

        /* Konten Utama (Latar Belakang Putih Melengkung) */
        .main-content {
            background-color: #ffffff;
            border-top-left-radius: 35px;
            border-top-right-radius: 35px;
            flex-grow: 1;
            padding: 28px 24px;
            overflow-y: auto;
        }

        /* Section Styling */
        h2 {
            color: #4A1D1D;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        /* Kotak Alamat */
        .address-box {
            background-color: #F7EAA2;
            color: #634343;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 18px;
        }

        /* Wadah Bingkai Peta Asli */
        .map-container {
            width: 100%;
            height: 180px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
        }

        /* Styling untuk Google Maps Iframe */
        .google-map-iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Bagian Kontak Sosial Media */
        .divider {
            border: none;
            border-top: 1px solid #F0F0F0;
            margin-bottom: 15px;
        }

        .contact-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .icon-label {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-circle {
            width: 40px;
            height: 40px;
            border: 2px solid #E05206;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #E05206;
            font-size: 20px;
        }

        .platform-name {
            font-size: 16px;
            font-weight: 600;
            color: #4A1D1D;
        }

        .contact-value {
            font-size: 12px;
            color: #7A6363;
            font-weight: 500;
        }

        /* Navigasi Bawah (Orange Bar) */
        .bottom-nav {
            background-color: #E05206;
            height: 65px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.6);
            font-size: 20px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-item.active,
        .nav-item:hover {
            color: #ffffff;
        }
    </style>
</head>

<body>

    <div class="phone-container">
        <div class="status-bar">
            <span class="time">16:04</span>
            <div class="status-icons">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-three-quarters"></i>
            </div>
        </div>

        <header class="app-header">
            <button class="back-btn"><i class="fa-solid fa-chevron-left"></i></button>
            <h1>Contact Us</h1>
        </header>

        <main class="main-content">

            <section class="address-section">
                <h2>Address</h2>
                <div class="address-box">
                    778 Locust View Drive Oaklanda, CA
                </div>
                
                <div class="map-container">
                    <iframe 
                        class="google-map-iframe"
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d126646.20452391097!2d112.64264287843058!3d-7.275973474320499!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2dd7fbf8381ddcdd%3A0x401e8f1fc28c6e0!2sSurabaya%2C%20Jawa%20Timur!5e0!3m2!1sid!2sid!4v1710000000000!5m2!1sid!2sid" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </section>

            <section class="contact-section">
                <h2>Contact Us</h2>
                <hr class="divider">

                <div class="contact-item">
                    <div class="icon-label">
                        <div class="icon-circle"><i class="fa-brands fa-whatsapp"></i></div>
                        <span class="platform-name">Whatsapp</span>
                    </div>
                    <span class="contact-value">0123456789</span>
                </div>

                <div class="contact-item">
                    <div class="icon-label">
                        <div class="icon-circle"><i class="fa-brands fa-tiktok"></i></div>
                        <span class="platform-name">Tiktok</span>
                    </div>
                    <span class="contact-value">@dumplin-surabaya</span>
                </div>

                <div class="contact-item">
                    <div class="icon-label">
                        <div class="icon-circle"><i class="fa-brands fa-instagram"></i></div>
                        <span class="platform-name">Instagram</span>
                    </div>
                    <span class="contact-value">@dumplin-surabaya</span>
                </div>
            </section>

        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item"><i class="fa-solid fa-house"></i></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-bowl-food"></i></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-heart"></i></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-clipboard-list"></i></a>
            <a href="#" class="nav-item active"><i class="fa-solid fa-headset"></i></a>
        </nav>
    </div>

</body>

</html>
