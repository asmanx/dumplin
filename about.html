<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>About</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            background-color: #FFD460;
        }

        .app-header {
            height: 100px;
            display: flex;
            align-items: center;
            padding: 15px 24px;
            position: relative;
        }

        .app-header h1 {
            flex-grow: 1;
            text-align: center;
            font-size: 25px;
            font-weight: bold;
            color: white;
            text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.1);
        }

        .btn-back {
            background: none;
            border: none;
            font-size: 16px;
            color: #E05206;
            cursor: pointer;
            font-weight: bold;
        }

        main {
            background: white;
            border-top-left-radius: 35px;
            border-top-right-radius: 35px;
            padding: 30px;
            flex-grow: 1;
        }

        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .logo-about {
            height: 100px;
        }

        .our-team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .group-profil {
            display: flex;
            gap: 20px;
            justify-content: space-around;
            align-items: center;
        }

        .profil {
            height: 60px;
            margin-bottom: 10px;
        }

        .nama {
            text-align: center;
        }

        .group-about {
            background-color: #F3E9B5;
            text-align: center;
            padding: 20px;
            border-radius: 15px;
        }

        .btn-nav {
            background-color: #E05206;
            height: 65px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.6);
            font-size: 25px;
            text-decoration: none;
            transition: color 0.2s;
            margin-top: 4px;
        }

        .nav-item.active,
        .nav-item:hover {
            color: #ffffff;
        }

        footer {
            background-color: white;
        }
    </style>
</head>

<body>
    <header>
        <div class="app-header">
            <button class="btn-back"> <i class="fa-solid fa-chevron-left"></i></button>
            <h1>Tentang</h1>
        </div>
    </header>

    <main>
        <div class="content">
            <div>
                <img class="logo-about" src="Img/logo-about.png" alt="">
            </div>

            <div class="our-team">
                <h4>Our Team</h4>
                <div class="group-profil">
                    <div>
                        <img class="profil" src="team/Ellipse 6.png" alt="">
                        <h5 class="nama">Rifa</h5>
                    </div>
                    <div>
                        <img class="profil" src="team/Ellipse 6.png" alt="">
                        <h5 class="nama">Asman</h5>
                    </div>
                    <div>
                        <img class="profil" src="team/Ellipse 6.png" alt="">
                        <h5 class="nama">Rafikhar</h5>
                    </div>
                    <div>
                        <img class="profil" src="team/Ellipse 6.png" alt="">
                        <h5 class="nama">Luthfi</h5>
                    </div>

                </div>
            </div>

            <div class="group-about">
                <h4>About</h4>
                <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Quod fuga ad facere vel? Ut necessitatibus
                    iure ducimus minima, consectetur est vitae atque, maiores quidem exercitationem quos omnis.
                    Distinctio, possimus cum!</p>
            </div>
        </div>
    </main>

    <footer>
        <nav class="btn-nav">
            <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i></a>
            <a href="order.html" class="nav-item"><i class="fa-solid fa-bowl-food"></i></a>
            <a href="about.html" class="nav-item active"><i class="fa-solid fa-clipboard-list"></i></a>
            <a href="contact.html" class="nav-item"><i class="fa-solid fa-headset"></i></a>
        </nav>
    </footer>


</body>

</html>
