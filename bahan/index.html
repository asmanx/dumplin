<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dumplin'</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFD460; /* Warna dasar supaya tidak putih saat loading */
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .splash-container {
            width: 100%;
            height: 100dvh;
            background-image: url('Img/dum.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* ==========================================================================
           OPTIMASI LAPTOP
           ========================================================================== */
        @media (min-width: 768px) {
            .splash-container {
                /* Di laptop, kita buat ukurannya seperti bingkai HP di tengah */
                max-width: 450px; 
                height: 85vh;
                border-radius: 30px;
                /* box-shadow: 0 20px 50px rgba(0,0,0,0.2); */
            }
            
            body {
                /* Latar belakang luar bingkai di laptop */
                background: linear-gradient(135deg, #990100);
            }
        }
    </style>
</head>

<body>
    <!-- Container gambar -->
    <div class="splash-container"></div>

    <script>
        // Otomatis pindah ke home.html setelah 2 detik
        setTimeout(function () {
            window.location.href = "home.html";
        }, 2000);
    </script>
</body>

</html>
