<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==========================================================================
           TAMPILAN ASLI HP (TIDAK DIUBAH)
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #FFD460;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-container {
            width: 100%;
            max-width: 412px;
            background-color: #FFD460;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            position: relative;
            overflow: hidden;
        }

        .app-header {
            height: 70px;
            display: flex;
            align-items: center;
            padding: 15px 24px;
            position: relative;
            flex-shrink: 0;
        }

        .app-header h1 {
            flex-grow: 1;
            text-align: center;
            font-size: 25px;
            font-weight: bold;
            color: #4A1D1D;
            text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.1);
        }

        .btn-back {
            background: none;
            border: none;
            font-size: 18px;
            color: #E05206;
            cursor: pointer;
            font-weight: bold;
            position: absolute;
            left: 24px;
            text-decoration: none;
            z-index: 10;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content {
            background-color: white;
            border-top-left-radius: 35px;
            border-top-right-radius: 35px;
            padding: 28px 24px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .section-address h2 {
            color: #4A1D1D;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .box-address {
            background-color: #F7EAA2;
            color: #634343;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 18px;
        }

        .map {
            width: 100%;
            height: 180px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }

        .google-maps {
            width: 100%;
            height: 100%;
            border: 0;
        }

        .divider {
            border: none;
            border-top: 1px solid #F0F0F0;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .contact h2 {
            color: #4A1D1D;
            font-size: 20px;
            font-weight: 700;
        }

        .contact-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .icon-label {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-circle {
            width: 40px;
            height: 40px;
            border: 2px solid #E05206;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #E05206;
            font-size: 20px;
        }

        .platform-name {
            font-size: 18px;
            font-weight: 600;
            color: #4A1D1D;
        }

        .contact-value {
            font-size: 13px;
            color: #7A6363;
            font-weight: 500;
        }

        footer {
            background-color: white;
            flex-shrink: 0;
        }

        .btn-nav {
            background-color: #E05206;
            height: 65px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.6);
            font-size: 25px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-item.active,
        .nav-item:hover {
            color: #ffffff;
        }

        /* ==========================================================================
           KHUSUS TAMPILAN LAPTOP (Screen > 768px)
           ========================================================================== */
        @media (min-width: 768px) {
            .phone-container {
                max-width: 900px;
                height: auto;
                min-height: 90vh;
                border-radius: 30px;
                box-shadow: 0 20px 50px rgba(0,0,0,0.1);
                margin: 20px;
            }

            .content {
                padding: 40px 60px;
                display: grid;
                grid-template-columns: 1fr 1fr; /* Membagi Address dan Contact jadi kiri-kanan */
                gap: 40px;
                border-top-left-radius: 30px;
                border-top-right-radius: 30px;
                align-items: start;
            }

            .section-address {
                grid-column: 1;
            }

            .contact {
                grid-column: 2;
                margin-top: 0;
            }

            .map {
                height: 300px; /* Peta lebih besar di laptop */
            }

            .box-address {
                font-size: 16px;
                padding: 20px;
            }

            .contact-item {
                padding: 10px 0;
                border-bottom: 1px solid #f9f9f9;
            }

            .platform-name {
                font-size: 20px;
            }

            .contact-value {
                font-size: 15px;
            }

            .btn-nav {
                height: 75px;
            }
        }
    </style>
</head>

<body>
    <div class="phone-container">
        <header>
            <div class="app-header">
                <a href="home.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
                <h1>Contact</h1>
            </div>
        </header>

        <main>
            <div class="content">
                <section class="section-address">
                    <h2>Address</h2>
                    <div class="box-address">
                        Surabaya, Jawa Timur, Indonesia.
                    </div>

                    <div class="map">
                        <iframe class="google-maps"
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d126646.20452391097!2d112.64264287843058!3d-7.275973474320499!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2dd7fbf8381ddcdd%3A0x401e8f1fc28c6e0!2sSurabaya%2C%20Jawa%20Timur!5e0!3m2!1sid!2sid!4v1710000000000!5m2!1sid!2sid"
                            allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                </section>

                <div class="contact">
                    <section>
                        <h2>Contact Us</h2>
                        <hr class="divider">
                    </section>

                    <div class="contact-item">
                        <div class="icon-label">
                            <div class="icon-circle"><i class="fa-brands fa-whatsapp"></i></div>
                            <span class="platform-name">Whatsapp</span>
                        </div>
                        <span class="contact-value">+62895623014023</span>
                    </div>

                    <div class="contact-item">
                        <div class="icon-label">
                            <div class="icon-circle"><i class="fa-brands fa-instagram"></i></div>
                            <span class="platform-name">Instagram</span>
                        </div>
                        <span class="contact-value">@dumplin_surabaya</span>
                    </div>

                    <div class="contact-item">
                        <div class="icon-label">
                            <div class="icon-circle"><i class="fa-brands fa-tiktok"></i></div>
                            <span class="platform-name">Tiktok</span>
                        </div>
                        <span class="contact-value">@dumplin_surabaya</span>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <nav class="btn-nav">
                <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i></a>
                <a href="order.html" class="nav-item"><i class="fa-solid fa-bowl-food"></i></a>
                <a href="about.html" class="nav-item"><i class="fa-solid fa-clipboard-list"></i></a>
                <a href="contact.html" class="nav-item active"><i class="fa-solid fa-headset"></i></a>
            </nav>
        </footer>
    </div>
</body>

</html>
